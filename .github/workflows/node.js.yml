# Build and test the React (Create React App) project across active Node.js versions.
# https://docs.github.com/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # CRA runs tests in watch mode by default; CI=true makes a single pass.
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: true
